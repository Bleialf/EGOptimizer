import_csv:
  name: Import CSV
  description: >
    Upload a grid-operator CSV export to the EGOptimizer brain (no folders
    needed). Provide a file path readable by Home Assistant, or paste the CSV
    content directly.
  fields:
    path:
      name: File path
      description: Path to a CSV file accessible to Home Assistant (e.g. /config/egexport.csv).
      example: /config/AT00...-Jahreseinspeisung-2026.csv
      selector:
        text:
    content:
      name: CSV content
      description: Alternatively, paste the raw CSV text.
      selector:
        text:
          multiline: true
    filename:
      name: Filename
      description: Original export filename (the metering-point id is read from it).
      example: AT00...-Jahreseinspeisung-2026.csv
      selector:
        text:
    provider:
      name: Provider
      description: Data provider format.
      default: netznoe
      selector:
        select:
          options: [netznoe]
    train:
      name: Train after import
      description: Refit the model once the data is imported.
      default: true
      selector:
        boolean:

train:
  name: Train model
  description: Refit the EGOptimizer absorption model from all imported data.

fetch:
  name: Fetch grid data
  description: >
    Pull the latest feed-in data straight from the grid operator's portal now.
    The brain logs in, downloads recent days (re-pulling the unsettled tail so
    the energy-community split is upgraded as it lands), de-duplicates, and
    retrains. Requires portal credentials in Options → Settings.
  fields:
    since:
      name: Since
      description: >
        First day to pull (YYYY-MM-DD). Leave empty for the automatic rolling
        window (fills the gap from your last data to today). Set it for a
        one-time historical backfill, e.g. your energy-community start date.
      example: "2025-07-24"
      selector:
        text:
    until:
      name: Until
      description: Last day to pull (YYYY-MM-DD). Defaults to today.
      example: "2026-06-20"
      selector:
        text:
