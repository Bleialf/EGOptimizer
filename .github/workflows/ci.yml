name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Run tests (stdlib only)
        run: python -m unittest discover -s tests -v

  coverage:
    # Enforces 100% line coverage of the brain so decision-path/wiring bugs
    # (e.g. the trough-display bug) can't slip through untested again.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install coverage pyyaml
      - name: Tests with coverage (brain must stay 100%)
        run: |
          python -m coverage run -m unittest discover -s tests
          python -m coverage report -m --include="brain/*" --fail-under=100

  hacs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: HACS validation
        uses: hacs/action@main
        with:
          category: integration
          # 'brands' requires submitting an icon to home-assistant/brands, a
          # separate process not needed for installing as a custom repository.
          ignore: brands

  integration-imports:
    # Import every integration module against a real Home Assistant so a bad
    # import path (e.g. DeviceInfo) or invalid selector fails CI, not your box.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install Home Assistant
        run: pip install homeassistant
      - name: Import integration modules
        run: python scripts/check_integration_imports.py
