# EGOptimizer dashboard — paste into a dashboard view's "raw configuration".
# Requires HACS frontend cards: apexcharts-card, mushroom.
# Plain-language edition. If an entity_id doesn't resolve, fix it in
# Developer Tools → States (all friendly names start with "EGOptimizer …").
title: EGOptimizer
path: egoptimizer
icon: mdi:battery-charging-outline
type: sections
max_columns: 3
sections:

  # ─────────────────────────────────────────────────────────── AT A GLANCE
  - type: grid
    cards:
      - type: heading
        heading: Right now

      - type: custom:mushroom-template-card
        entity: sensor.egoptimizer_feed_setpoint
        primary: >-
          {{ (states('sensor.egoptimizer_feed_setpoint') | float(0) / -1000.0) | round(2) }} kW
        secondary: Power being given to the community right now
        icon: mdi:transmission-tower-export
        icon_color: >-
          {{ 'green' if states('sensor.egoptimizer_feed_setpoint') | float(0) < 0 else 'grey' }}
        layout: horizontal

      - type: custom:mushroom-chips-card
        alignment: center
        chips:
          - type: template
            entity: sensor.egoptimizer_status
            icon: mdi:state-machine
            icon_color: >-
              {% set s = states('sensor.egoptimizer_status') %}
              {% if s == 'feeding' %}green{% elif s == 'holding' %}amber{% else %}grey{% endif %}
            content: >-
              {% set s = states('sensor.egoptimizer_status') %}
              {% if s == 'feeding' %}Giving now{% elif s == 'holding' %}Waiting{% elif s == 'no_budget' %}Nothing to give{% else %}{{ s | title }}{% endif %}
          - type: template
            entity: sensor.egoptimizer_confidence
            icon: mdi:school-outline
            icon_color: >-
              {% set c = states('sensor.egoptimizer_confidence') %}
              {% if c == 'probing' %}blue{% elif c == 'confident' %}green{% elif c == 'locked' %}purple{% else %}grey{% endif %}
            content: >-
              {% set c = states('sensor.egoptimizer_confidence') %}
              {% if c == 'probing' %}Still learning{% elif c == 'confident' %}Knows the limit{% elif c == 'locked' %}Locked in{% else %}No data yet{% endif %}

      - type: markdown
        content: >-
          **What it's doing:** {{ states('sensor.egoptimizer_reasoning') }}

      - type: grid
        square: false
        columns: 2
        cards:
          - type: custom:mushroom-template-card
            entity: sensor.egoptimizer_planned_tonight
            primary: "{{ states('sensor.egoptimizer_planned_tonight') }} kWh"
            secondary: Total it plans to give (incl. daytime)
            icon: mdi:transmission-tower-export
            icon_color: blue
          - type: custom:mushroom-template-card
            entity: sensor.egoptimizer_eg_budget_tonight
            primary: "{{ states('sensor.egoptimizer_eg_budget_tonight') }} kWh"
            secondary: Spare to give before morning
            icon: mdi:battery-heart-variant
            icon_color: green
          - type: custom:mushroom-template-card
            entity: sensor.egoptimizer_forecast_trough_soc
            primary: >-
              {{ states('sensor.egoptimizer_forecast_trough_soc') }}%
              {%- set t = states('sensor.egoptimizer_trough_time') -%}
              {{ ' @ ' ~ as_datetime(t).strftime('%H:%M') if as_datetime(t) is not none else '' }}
            secondary: Lowest the battery will get tonight
            icon: mdi:battery-low
            icon_color: amber
          - type: custom:mushroom-template-card
            entity: sensor.egoptimizer_pv_takeover_time
            primary: >-
              {% set t = states('sensor.egoptimizer_pv_takeover_time') %}{{ as_datetime(t).strftime('%H:%M') if as_datetime(t) is not none else 'N/A' }}
            secondary: When solar starts covering the house
            icon: mdi:weather-sunny
            icon_color: yellow
          - type: custom:mushroom-template-card
            entity: sensor.technikraum_egoptimizer_house_load_now_avg
            primary: "{{ states('sensor.technikraum_egoptimizer_house_load_now_avg') }} kW"
            secondary: House use right now (smoothed)
            icon: mdi:home-lightning-bolt
            icon_color: orange
          - type: custom:mushroom-template-card
            entity: sensor.technikraum_egoptimizer_base_load_overnight_est
            primary: "{{ states('sensor.technikraum_egoptimizer_base_load_overnight_est') }} kW"
            secondary: Assumed overnight house use
            icon: mdi:home-clock
            icon_color: blue-grey

      - type: entities
        title: Your settings
        show_header_toggle: false
        entities:
          - entity: number.egoptimizer_target_morning_soc
            name: Keep battery at least (by morning)
          - entity: number.egoptimizer_exploration_aggressiveness
            name: How boldly to test higher (0 = cautious)
          - entity: select.egoptimizer_learning_mode
            name: Mode — explore (learn) or locked (no testing)
          - type: buttons
            entities:
              - entity: button.technikraum_egoptimizer_refresh_recommendation
                name: Recalculate
                icon: mdi:refresh
              - entity: button.technikraum_egoptimizer_train_model
                name: Re-learn from data
                icon: mdi:school

  # ─────────────────────────────────────────────────────────── TONIGHT'S PLAN
  - type: grid
    cards:
      - type: heading
        heading: The plan — how much to give, hour by hour

      - type: markdown
        content: >-
          **How to read this:** green bars = amounts we already know the
          community takes; orange bars = a little *extra* we're testing to see if
          they'll take more (that's how it learns). The blue line is the most
          we'd give that hour. Bars below the line were trimmed to protect your
          morning battery target.

      - type: custom:apexcharts-card
        graph_span: 24h
        span:
          start: hour
        header:
          show: true
          title: Energy given to the community (kWh per hour)
        apex_config:
          xaxis:
            labels:
              format: HH:mm
        yaxis:
          - id: energy
            min: 0
            decimals: 2
        series:
          - entity: sensor.egoptimizer_feed_setpoint
            name: Give (known amount)
            unit: kWh
            yaxis_id: energy
            type: column
            color: "#2ecc71"
            data_generator: |
              return (entity.attributes.feed_plan || []).map((i) => {
                return [new Date(i.time).getTime(), i.explore ? 0 : i.feed_kwh];
              });
          - entity: sensor.egoptimizer_feed_setpoint
            name: Give (testing higher)
            unit: kWh
            yaxis_id: energy
            type: column
            color: "#e67e22"
            data_generator: |
              return (entity.attributes.feed_plan || []).map((i) => {
                return [new Date(i.time).getTime(), i.explore ? i.feed_kwh : 0];
              });
          - entity: sensor.egoptimizer_feed_setpoint
            name: Most we'd give this hour
            unit: kWh
            yaxis_id: energy
            type: line
            color: "#3498db"
            stroke_width: 3
            data_generator: |
              return (entity.attributes.feed_plan || []).map((i) => {
                return [new Date(i.time).getTime(), i.capacity_kwh];
              });

      - type: markdown
        content: |
          ### Hour-by-hour plan
          **Will give** = what we'll actually feed · **Aiming for** = the most
          we'd give if the battery allowed · **Testing?** 🟠 = trying a bit extra
          to learn, 🟢 = sticking to the known amount. When *Will give* is below
          *Aiming for*, that hour was trimmed to keep your morning battery target.
          {% set plan = state_attr('sensor.egoptimizer_feed_setpoint', 'feed_plan') or [] %}
          {%- if plan %}
          {%- set ns = namespace(rows=['| Time | Will give | Aiming for | Testing? |', '| :--- | :--- | :--- | :--- |']) %}
          {%- for i in plan %}
          {%- set t = as_datetime(i.time) %}
          {%- set tt = t.strftime('%H:%M') if t is not none else i.hour %}
          {%- set trimmed = (i.capacity_kwh | float(0)) - (i.feed_kwh | float(0)) > 0.02 %}
          {%- set give = ((i.feed_kwh | float(0)) | round(2)) ~ (' ⚠️' if trimmed else '') %}
          {%- set ns.rows = ns.rows + ['| **' ~ tt ~ '** | ' ~ give ~ ' kWh | ' ~ ((i.capacity_kwh | float(0)) | round(2)) ~ ' kWh | ' ~ ('🟠 testing' if i.explore else '🟢 known') ~ ' |'] %}
          {%- endfor %}

          {{ ns.rows | join('\n') }}
          {%- else %}

          _Nothing planned right now (waiting, or no spare energy)._
          {%- endif %}

          {% set c = state_attr('sensor.egoptimizer_feed_setpoint', 'debug') %}
          {%- if c and c.context and c.context.observations %}
          {%- set ctx = c.context %}
          {%- set recent = ctx.effective_recent_obs | float(0) %}
          ### This hour's learning
          - **When:** {{ ctx.bucket }} (season · weekday/weekend · hour)
          - **Status:** {% if ctx.best_was_censored %}testing higher — your feed gets fully absorbed, so the true limit is still unknown{% elif recent < 5 %}re-checking — little recent data for this slot, so it probes again{% else %}settled — we've seen the limit and feed to it{% endif %}
          - **Community has taken:** {{ (ctx.mean_absorbed_kwh | float(0)) | round(2) }} kWh typical, {{ (ctx.max_absorbed_kwh | float(0)) | round(2) }} kWh best
          - **Aiming to give this hour:** {{ (ctx.recommended_capacity_kwh | float(0)) | round(2) }} kWh
          - **Evidence:** {{ ctx.observations | int }} past nights, {{ recent | round(1) }} weighted-recent
          {%- endif %}

  # ─────────────────────────────────────────────────────────── BATTERY FORECAST
  - type: grid
    cards:
      - type: heading
        heading: Battery forecast (tonight → tomorrow)

      - type: markdown
        content: >-
          Green = predicted battery level, yellow = expected solar, red dashes =
          your morning target. The plan guarantees the green line never crosses
          below the red line before solar takes over.

      - type: custom:apexcharts-card
        graph_span: 24h
        span:
          start: hour
        header:
          show: true
          title: Battery level vs. solar
        apex_config:
          xaxis:
            labels:
              format: HH:mm
        yaxis:
          - id: soc
            min: 0
            max: 100
            decimals: 0
          - id: pv
            opposite: true
            min: 0
            decimals: 2
        series:
          - entity: sensor.egoptimizer_feed_setpoint
            name: Battery level
            unit: "%"
            yaxis_id: soc
            type: line
            color: "#2ecc71"
            stroke_width: 3
            data_generator: |
              return (entity.attributes.soc_forecast || []).map((i) => {
                return [new Date(i.t).getTime(), i.soc_pct];
              });
          - entity: sensor.egoptimizer_feed_setpoint
            name: Solar
            unit: kW
            yaxis_id: pv
            type: area
            color: "#f1c40f"
            opacity: 0.25
            data_generator: |
              return (entity.attributes.soc_forecast || []).map((i) => {
                return [new Date(i.t).getTime(), i.pv_kw];
              });
          - entity: sensor.egoptimizer_feed_setpoint
            name: Morning target
            unit: "%"
            yaxis_id: soc
            type: line
            color: "#e74c3c"
            stroke_width: 2
            data_generator: >
              const tgt = (entity.attributes.debug && entity.attributes.debug.inputs
                          && entity.attributes.debug.inputs.target_morning_soc_pct) || 50;
              return (entity.attributes.soc_forecast || []).map((i) => {
                return [new Date(i.t).getTime(), tgt];
              });

  # ─────────────────────────────────────────────────────────── UNDER THE HOOD
  - type: grid
    cards:
      - type: heading
        heading: Under the hood (for debugging)

      - type: markdown
        content: >-
          {% set d = state_attr('sensor.egoptimizer_feed_setpoint', 'debug') %}

          {% if d %}### What it decided

          | | |

          | :--- | :--- |

          | Decision | `{{ d.decision.path }}` |

          | Giving now? | `{{ d.decision.status }}` ({{ d.decision.confidence }}) |


          ### What it's seeing

          | | |

          | :--- | :--- |

          | Battery now | {{ d.inputs.soc_pct }}% |

          | Keep ≥ by morning | {{ d.inputs.target_morning_soc_pct }}% (hard floor {{ d.inputs.hard_min_soc_pct }}%) |

          | Battery size | {{ d.inputs.capacity_kwh }} kWh |

          | House use now | {{ (d.inputs.load_now_kw | float(0)) | round(3) }} kW |

          | **Overnight house use (used for the plan)** | **{{ (d.inputs.load_kw | float(0)) | round(3) }} kW** |

          | Mode / boldness | {{ d.inputs.mode }} / {{ d.inputs.exploration_aggressiveness }} |


          ### Battery safety check

          | | |

          | :--- | :--- |

          | Spare to give before morning | {{ (d.autarky.eg_budget_kwh | float(0)) | round(2) }} kWh |

          | Lowest battery point | {{ d.autarky.trough_soc_pct }}% @ {{ d.autarky.trough_time }} |

          | Solar covers house at | {{ d.autarky.pv_takeover_time }} |

          | Learned patterns | {{ d.model.bucket_count }} (model loaded: {{ d.model.loaded }}) |

          {% else %}_No data yet._{% endif %}

      - type: custom:mushroom-template-card
        entity: sensor.technikraum_egoptimizer_base_load_overnight_est
        primary: "{{ states('sensor.technikraum_egoptimizer_base_load_overnight_est') }} kW"
        secondary: >-
          Overnight house-use estimate (from: {{ state_attr('sensor.technikraum_egoptimizer_base_load_overnight_est', 'source') }})
        icon: mdi:home-clock
        icon_color: blue-grey

      - type: history-graph
        hours_to_show: 48
        title: Last 48 hours
        entities:
          - entity: sensor.egoptimizer_feed_setpoint
            name: Given to community (W)
          - entity: sensor.egoptimizer_eg_budget_tonight
            name: Spare to give (kWh)
          - entity: sensor.egoptimizer_forecast_trough_soc
            name: Lowest battery forecast (%)

  # ─────────────────────────────────────────────────────────── DATA & SETTINGS
  - type: grid
    cards:
      - type: heading
        heading: Data & setup

      - type: markdown
        content: >-
          **Upload your grid data, change battery/sensor settings, or delete old
          data** here:


          **Settings → Devices & Services → EGOptimizer → Configure**


          Use the buttons below to recalculate now or re-learn from your data.

      - type: entities
        show_header_toggle: false
        entities:
          - entity: button.technikraum_egoptimizer_refresh_recommendation
            name: Recalculate now
            icon: mdi:refresh
          - entity: button.technikraum_egoptimizer_train_model
            name: Re-learn from data
            icon: mdi:school
          - entity: update.egoptimizer_update
            name: Integration update
